[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "wasm32-unknown-unknown" },
]

[advisories]
version = 2
yanked = "deny"
ignore = ["RUSTSEC-2025-0057"]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
