name: Rivet Performance

on:
  workflow_dispatch:
  schedule:
    - cron: 0 3 * * 1

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run runtime benchmark suite
        run: cargo bench -p rivet-runtime --bench cache_roundtrip -- --sample-size 10

      - name: Run LSP benchmark suite
        run: cargo bench -p rivet-lsp --bench cached_reads -- --sample-size 10

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: criterion-results
          path: target/criterion
          if-no-files-found: ignore

  performance-doc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate performance documentation exists
        run: test -f docs/core/performance.md

      # Plugin release remains upstream-gated until Extism/Wasmtime advisories are remediated.
